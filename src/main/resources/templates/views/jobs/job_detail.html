<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Job Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="container-fluid">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/}">ATS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" th:href="@{/jobs}">Job Management</a>
                    </li>
                    <li class="nav-item dropdown" th:if="${session.user != null}">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                           data-bs-toggle="dropdown" aria-expanded="false" th:text="${session.user.fullName}">
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">Profile</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" th:href="@{/auths/logout}">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="row p-4 d-flex justify-content-center mt-3">
        <h2 id="formTitle">Job Detail</h2>
        <hr>
        <div class="text-success" th:text="${message}"></div>
        <form class="row" id="job-form" method="post">
            <div class="col-md-5">
                <!--Left-->
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control" name="title" id="title" required placeholder="Enter job title">
                </div>
                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <input type="text" class="form-control" name="location" id="location" required placeholder="Enter job location">
                </div>
                <div class="mb-3">
                    <label class="form-label">Min salary</label>
                    <input type="number" name="minSalary" id="minSalary" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Max salary</label>
                    <input type="number" name="maxSalary" id="maxSalary" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary px-5" id="saveBtn">Save</button>
                <a type="button" class="btn btn-secondary px-5" th:href="@{/jobs}">Close</a>

            </div>
            <div class="col-md-5">
                <!--Right-->
                <div class="mb-3">
                    <label class="form-label">Deadline</label>
                    <input type="date" name="deadline" id="deadline" class="form-control" required>
                </div>

                <select class="form-select mb-3" name="departmentId" id="departmentId">
                    <option selected value="">Open this select menu</option>
                </select>

                <div class="mb-3">
                    <label class="form-label">Skills</label>
                    <div id="skillIds" class="d-flex flex-wrap gap-3"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" rows="6" name="description" id="description"></textarea>
                </div>

                 </div>
        </form>
    </div>

</div>

<div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

<script th:src="@{/job-form-async.js}"></script>

<!-- ============ Fallback (sync Thymeleaf version - comment lại để rollback nếu async lỗi) ============
<form class="row" th:action="@{/jobs}" th:object="${job}" method="post" id="job-form-sync">
    ... (giữ form Thymeleaf th:object="${job}" + th:each departments/skills) ...
</form>
-->
</body>
</html>
