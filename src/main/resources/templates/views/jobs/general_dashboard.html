<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="container-fluid">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/}">ATS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" th:href="@{/jobs}">Job Management</a>
                    </li>
                    <li class="nav-item dropdown" th:if="${session.user != null}">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                           data-bs-toggle="dropdown" aria-expanded="false" th:text="${session.user.fullName}">
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">Profile</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" th:href="@{/auths/logout}">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="row p-4 d-flex justify-content-center">
        <div class="col-md-11">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="mb-0">General Dashboard</h3>
                <a class="btn btn-info" th:href="@{/jobs/detail}">Create new</a>
            </div>
            <hr>
            <p class="text-success" th:text="${message}"></p>

            <div class="d-flex align-items-center gap-2 mb-3">
                <input class="form-control" type="search" id="searchInput" placeholder="Search title / description...">
            </div>
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Title</th>
                    <th scope="col">Description</th>
                    <th scope="col">Location</th>
                    <th scope="col">Min Salary</th>
                    <th scope="col">Max Salary</th>
                    <th scope="col">Status</th>
                    <th scope="col">Deadline</th>
                    <th scope="col">Published At</th>
                    <th scope="col" class="w-25">Actions</th>
                </tr>
                </thead>
                <tbody id="jobTable">
                </tbody>
            </table>

            <!-- Delete Confirm Modal -->
            <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Confirm Delete</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            Are you sure you want to delete job #<span id="deleteJobId"></span>?
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

<script th:src="@{/dashboard-async.js}"></script>

<!-- ============ Fallback (sync Thymeleaf version - comment lại để rollback nếu async lỗi) ============
<div class="row p-4 d-flex justify-content-center">
    <div class="col-md-11">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>#</th><th>Title</th><th>Description</th><th>Location</th>
                <th>Min Salary</th><th>Max Salary</th><th>Status</th>
                <th>Deadline</th><th>Published At</th><th class="w-25">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="job: ${jobs}">
                <td th:text="${job.id}"></td>
                <td th:text="${job.title}"></td>
                <td th:text="${job.description}"></td>
                <td th:text="${job.location}"></td>
                <td th:text="${job.minSalary}"></td>
                <td th:text="${job.maxSalary}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${job.status == 'PUBLISH'} ? 'bg-success' : (${job.status == 'DELETED'} ? 'bg-danger' : 'bg-secondary')"
                          th:text="${job.status}"></span>
                </td>
                <td th:text="${job.deadline != null} ? ${#temporals.format(job.deadline, 'dd MMM yyyy')} : '-'"></td>
                <td th:text="${job.publishedAt != null} ? ${#temporals.format(job.publishedAt, 'dd MMM yyyy')} : '-'"></td>
                <td>
                    <a type="button" class="btn btn-primary btn-sm" th:href="@{'/jobs/' + ${job.id}}">Edit</a>
                    <a type="button" class="btn btn-danger btn-sm" th:id="${job.id}">Delete</a>
                </td>
            </tr>
            <tr th:if="${jobs == null or jobs.isEmpty()}">
                <td colspan="10" class="text-center text-muted py-4">No jobs found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
