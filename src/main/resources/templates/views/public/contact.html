<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{views/layout/public_layout.html}">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
</head>
<body>
<main layout:fragment="content" th:with="active='contact'" class="container py-5">
    <div class="row g-5">
        <div class="col-lg-5">
            <h2 class="fw-bold mb-3">Get in touch</h2>
            <p class="text-muted mb-4">Have a question or need help? Fill the form and we will get back to you shortly.</p>

            <ul class="list-unstyled d-grid gap-3 jb-meta">
                <li><i class="bi bi-geo-alt me-2 text-success"></i> 123 Nguyen Van Linh, Da Nang, Viet Nam</li>
                <li><i class="bi bi-envelope me-2 text-success"></i> contact&#64;jobboard.vn</li>
                <li><i class="bi bi-telephone me-2 text-success"></i> +84 236 123 456</li>
            </ul>
        </div>

        <div class="col-lg-7">
            <div class="jb-card p-4 p-md-5">
                <form onsubmit="return false">
                    <div class="mb-3">
                        <label class="form-label">Your name</label>
                        <input type="text" class="form-control" placeholder="John Doe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="name&#64;example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="5" placeholder="How can we help?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-jb px-4">Send message</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
