<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
  Reusable site header / navbar.
  Usage:  <header th:replace="~{views/fragments/header :: header('browse')}"></header>
  Param `active` (string) highlights the current menu item: home | browse | pages | blog | contact
-->
<body>
<header th:fragment="header(active)" class="jb-header">
    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container-fluid px-4">

            <!-- Brand -->
            <a class="navbar-brand d-flex align-items-center gap-2 me-4" th:href="@{/}" href="/">
                <span class="jb-brand-logo d-inline-flex align-items-center justify-content-center">
                    <i class="bi bi-search"></i>
                </span>
                <span class="lh-1">
                    <span class="fw-bold fs-4 d-block">Job Board</span>
                    <small class="text-secondary">Find your dream job</small>
                </span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#jbNavbar" aria-controls="jbNavbar"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="jbNavbar">
                <!-- Center menu -->
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-2">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${active == 'home'} ? 'active fw-bold'"
                           th:href="@{/}" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${active == 'browse'} ? 'active fw-bold'"
                           th:href="@{/public/jobs}" href="/public/jobs">Browse Job</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${active == 'contact'} ? 'active fw-bold'"
                           th:href="@{/contact}" href="/contact">Contact</a>
                    </li>
                </ul>

                <!-- Right actions -->
                <div th:if="${session.user != null}" class="d-flex align-items-center gap-3" id="navbarNavDropdown">
                    <li class="nav-item dropdown list-unstyled">
                        <a class="nav-link dropdown-toggle" href="#" th:text="${session.user.fullName}" id="navbarDropdownMenuLink" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdownMenuLink">
                            <li><a class="dropdown-item" th:href="@{/jobs}">Dashboard</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" th:href="@{/auths/logout}">Logout</a></li>
                        </ul>
                    </li>
                </div>
                <div th:if="${session.user == null}" class="d-flex align-items-center gap-3">
                    <a class="nav-link text-light" th:href="@{/auths/login}" href="/auths/login">Log in</a>
                </div>
            </div>
        </div>
    </nav>
</header>

</body>
</html>
